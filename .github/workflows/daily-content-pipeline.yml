name: Daily Content Pipeline

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  stage-daily-content-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish queued content
        run: npm run content:daily

      - name: Validate content
        run: npm run validate:content

      - name: Check links
        run: npm run check:links

      - name: Build
        run: npm run build

      - name: Detect changes
        id: detect_changes
        run: |
          if [ -z "$(git status --short)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage generated daily content changes
        if: steps.detect_changes.outputs.changed == 'true'
        run: git add -A

      - name: Review staged daily content package
        if: steps.detect_changes.outputs.changed == 'true'
        id: review_package
        env:
          DAILY_CONTENT_BASE_REF: origin/main
        run: node ./scripts/review-daily-content-pr.mjs

      - name: Create daily content pull request
        if: steps.detect_changes.outputs.changed == 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/daily-content-${{ steps.review_package.outputs.branch_suffix }}-${{ github.run_id }}
          base: main
          delete-branch: true
          commit-message: "chore(content): stage daily website update for ${{ steps.review_package.outputs.published_at }}"
          title: "chore(content): review daily website update for ${{ steps.review_package.outputs.published_at }}"
          body: |
            ## Automated daily content review package

            ${{ steps.review_package.outputs.review_body }}

            This PR was prepared automatically from `automation/daily-content-queue/` and will be auto-reviewed before merge.
          add-paths: |
            automation/daily-content-queue
            src/content/blog

      - name: Report no content due today
        if: steps.detect_changes.outputs.changed != 'true'
        run: echo "No queued content was due for publication today."
