name: Daily Content Pipeline

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-daily-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish queued content
        run: npm run content:daily

      - name: Validate content
        run: npm run validate:content

      - name: Check links
        run: npm run check:links

      - name: Build
        run: npm run build

      - name: Detect changes
        id: detect_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit daily content release
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/daily-content-queue src/content/blog
          git commit -m "chore(content): publish daily website update"
          git push origin HEAD:main

      - name: No content due today
        if: steps.detect_changes.outputs.changed != 'true'
        run: echo "No queued content was due for publication today."
