name: Daily Content Pipeline

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PAGES_PROJECT_NAME: lecturer-materials

concurrency:
  group: daily-content-pipeline-main
  cancel-in-progress: false

jobs:
  publish-daily-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish queued content
        run: npm run content:daily

      - name: Detect changes
        id: detect_changes
        run: |
          if [ -z "$(git status --short)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage generated daily content changes
        if: steps.detect_changes.outputs.changed == 'true'
        run: git add -A

      - name: Review staged daily content package
        if: steps.detect_changes.outputs.changed == 'true'
        id: review_package
        env:
          DAILY_CONTENT_BASE_REF: origin/main
        run: node ./scripts/review-daily-content-pr.mjs

      - name: Validate content
        if: steps.detect_changes.outputs.changed == 'true'
        run: npm run validate:content

      - name: Check links
        if: steps.detect_changes.outputs.changed == 'true'
        run: npm run check:links

      - name: Build
        if: steps.detect_changes.outputs.changed == 'true'
        run: npm run build

      - name: Commit and push daily content
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(content): publish daily website update for ${{ steps.review_package.outputs.published_at }}"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Deploy daily content to Cloudflare Pages
        if: steps.detect_changes.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ env.PAGES_PROJECT_NAME }} --branch main

      - name: Report published content
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          echo "Published and deployed daily content: ${{ steps.review_package.outputs.title }}"
          echo "Target: ${{ steps.review_package.outputs.target_path }}"

      - name: Report no content due today
        if: steps.detect_changes.outputs.changed != 'true'
        run: echo "No queued content was due for publication today."
