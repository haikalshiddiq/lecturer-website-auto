name: Deploy Cloudflare Worker

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy-worker:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker/contact-form
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/contact-form/package.json

      - name: Install worker dependencies
        run: npm install

      - name: Sync optional contact delivery secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTACT_WEBHOOK_URL: ${{ secrets.CONTACT_WEBHOOK_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -n "$CONTACT_WEBHOOK_URL" ]; then
            printf '%s' "$CONTACT_WEBHOOK_URL" | npx wrangler secret put CONTACT_WEBHOOK_URL
          fi

          if [ -n "$RESEND_API_KEY" ]; then
            printf '%s' "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY
          fi

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker/contact-form
          command: deploy
