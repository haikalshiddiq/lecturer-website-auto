name: Review Daily Content PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  review-and-merge:
    if: startsWith(github.event.pull_request.head.ref, 'automation/daily-content-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Check links
        run: npm run check:links

      - name: Build
        run: npm run build

      - name: Review staged daily content package
        id: review_package
        env:
          DAILY_CONTENT_BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: node ./scripts/review-daily-content-pr.mjs

      - name: Approve and merge daily content PR
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ steps.review_package.outputs.review_body }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const reviewBody = process.env.REVIEW_BODY;

            if (pr.merged || pr.state !== 'open') {
              core.info(`PR #${pr.number} is already ${pr.state}.`);
              return;
            }

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: 'APPROVE',
                body: `Automated daily content review passed.\n\n${reviewBody}`
              });
            } catch (error) {
              core.warning(`Review approval could not be submitted: ${error.message}`);
            }

            try {
              await github.graphql(`
                mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                    pullRequest {
                      number
                    }
                  }
                }
              `, {
                pullRequestId: pr.node_id
              });
              core.info(`Auto-merge enabled for PR #${pr.number}.`);
              return;
            } catch (error) {
              core.warning(`Auto-merge could not be enabled: ${error.message}`);
            }

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash'
            });
            core.info(`PR #${pr.number} merged immediately after automated review.`);
