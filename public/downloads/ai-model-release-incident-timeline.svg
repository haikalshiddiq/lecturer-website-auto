<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Model Release Incident Timeline</title>
  <desc id="desc">A classroom diagram showing pre-release evidence, early production signals, incident confirmation, and the governance decisions students should make during an AI model rollout.</desc>
  <rect width="1200" height="760" rx="32" fill="#0f172a"/>
  <rect x="54" y="54" width="1092" height="652" rx="28" fill="#f8fafc"/>
  <text x="96" y="116" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">AI model release incident timeline</text>
  <text x="96" y="154" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Use this map to move learners from offline evaluation evidence to rollback-ready governance decisions.</text>

  <line x1="148" y1="292" x2="1052" y2="292" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>

  <g transform="translate(96 210)">
    <circle cx="52" cy="82" r="34" fill="#2563eb"/>
    <text x="52" y="91" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">1</text>
    <rect x="0" y="128" width="232" height="232" rx="20" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <text x="24" y="170" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#1e3a8a">Pre-release gate</text>
    <text x="24" y="205" font-family="Inter, Arial, sans-serif" font-size="15" fill="#1e40af">• F1 improves from 0.81 to 0.87</text>
    <text x="24" y="232" font-family="Inter, Arial, sans-serif" font-size="15" fill="#1e40af">• Regression suite passes</text>
    <text x="24" y="259" font-family="Inter, Arial, sans-serif" font-size="15" fill="#1e40af">• Staging telemetry is green</text>
    <text x="24" y="300" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#172554">Student decision:</text>
    <text x="24" y="326" font-family="Inter, Arial, sans-serif" font-size="15" fill="#1e40af">Approve, add checks, or hold?</text>
  </g>

  <g transform="translate(356 210)">
    <circle cx="52" cy="82" r="34" fill="#7c3aed"/>
    <text x="52" y="91" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">2</text>
    <rect x="0" y="128" width="232" height="232" rx="20" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
    <text x="24" y="170" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#4c1d95">Canary release</text>
    <text x="24" y="205" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5b21b6">• 25% traffic exposure</text>
    <text x="24" y="232" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5b21b6">• Latency remains healthy</text>
    <text x="24" y="259" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5b21b6">• Override count rises quickly</text>
    <text x="24" y="300" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#3b0764">Student decision:</text>
    <text x="24" y="326" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5b21b6">Which signals now matter most?</text>
  </g>

  <g transform="translate(616 210)">
    <circle cx="52" cy="82" r="34" fill="#dc2626"/>
    <text x="52" y="91" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">3</text>
    <rect x="0" y="128" width="232" height="232" rx="20" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
    <text x="24" y="170" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#7f1d1d">Incident evidence</text>
    <text x="24" y="205" font-family="Inter, Arial, sans-serif" font-size="15" fill="#991b1b">• Urgent cases are misrouted</text>
    <text x="24" y="232" font-family="Inter, Arial, sans-serif" font-size="15" fill="#991b1b">• Multilingual inputs fail</text>
    <text x="24" y="259" font-family="Inter, Arial, sans-serif" font-size="15" fill="#991b1b">• High confidence is misleading</text>
    <text x="24" y="300" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#450a0a">Student decision:</text>
    <text x="24" y="326" font-family="Inter, Arial, sans-serif" font-size="15" fill="#991b1b">Freeze, roll back, or continue?</text>
  </g>

  <g transform="translate(876 210)">
    <circle cx="52" cy="82" r="34" fill="#059669"/>
    <text x="52" y="91" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">4</text>
    <rect x="0" y="128" width="232" height="232" rx="20" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2"/>
    <text x="24" y="170" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#064e3b">Governance loop</text>
    <text x="24" y="205" font-family="Inter, Arial, sans-serif" font-size="15" fill="#065f46">• Rollback criteria become gates</text>
    <text x="24" y="232" font-family="Inter, Arial, sans-serif" font-size="15" fill="#065f46">• Dashboards track user impact</text>
    <text x="24" y="259" font-family="Inter, Arial, sans-serif" font-size="15" fill="#065f46">• Retrospective updates policy</text>
    <text x="24" y="300" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#022c22">Student decision:</text>
    <text x="24" y="326" font-family="Inter, Arial, sans-serif" font-size="15" fill="#065f46">What blocks the next release?</text>
  </g>

  <rect x="96" y="610" width="1008" height="60" rx="18" fill="#e2e8f0"/>
  <text x="124" y="648" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">Facilitator cue:</text>
  <text x="274" y="648" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">Treat green infrastructure checks as necessary, not sufficient, for trustworthy AI release readiness.</text>
</svg>
