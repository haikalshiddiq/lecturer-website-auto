    <text x="718" y="290" fill="#E2E8F0" font-size="24" font-weight="700">Approval</text>
    <text x="712" y="325" fill="#94A3B8" font-size="18">Evidence review</text>
    <rect x="940" y="240" rx="28" ry="28" width="230" height="120" fill="#132238" stroke="#F59E0B" stroke-width="2"/>
    <text x="997" y="290" fill="#E2E8F0" font-size="24" font-weight="700">Deploy</text>
    <text x="978" y="325" fill="#94A3B8" font-size="18">Controlled release</text>
    <rect x="1220" y="240" rx="28" ry="28" width="230" height="120" fill="#132238" stroke="#FB7185" stroke-width="2"/>
    <text x="1273" y="290" fill="#E2E8F0" font-size="24" font-weight="700">Monitor</text>
    <text x="1259" y="325" fill="#94A3B8" font-size="18">Behavior &amp; drift</text>
    <path d="M330 300H380" stroke="#38BDF8" stroke-width="4"/>
    <path d="M610 300H660" stroke="#38BDF8" stroke-width="4"/>
    <path d="M890 300H940" stroke="#38BDF8" stroke-width="4"/>
    <path d="M1170 300H1220" stroke="#38BDF8" stroke-width="4"/>
    <rect x="100" y="470" rx="32" ry="32" width="1350" height="250" fill="#0F1B2D" stroke="#1E293B" stroke-width="2"/>
    <text x="140" y="530" fill="#F8FAFC" font-size="28" font-weight="700">Responsible-release prompts</text>
    <text x="140" y="580" fill="#CBD5E1" font-size="22">• Which evaluation result is strong enough for release approval?</text>
    <text x="140" y="620" fill="#CBD5E1" font-size="22">• What rollback trigger protects users from weak AI behavior?</text>
    <text x="140" y="660" fill="#CBD5E1" font-size="22">• Which post-release signal matters most in the first 24 hours?</text>
