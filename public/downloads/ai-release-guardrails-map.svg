    <text x="146" y="325" fill="#94A3B8" font-size="18">Expected outputs</text>
    <rect x="380" y="240" rx="28" ry="28" width="230" height="120" fill="#132238" stroke="#22C55E" stroke-width="2"/>
    <text x="431" y="290" fill="#E2E8F0" font-size="24" font-weight="700">Model Gates</text>
    <text x="439" y="325" fill="#94A3B8" font-size="18">Threshold &amp; safety</text>
