<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <rect width="1600" height="900" fill="#07111F"/>
  <text x="90" y="110" fill="#F8FAFC" font-size="42" font-family="Arial" font-weight="700">Information Systems CI/CD Governance Map</text>
  <text x="90" y="155" fill="#93C5FD" font-size="20" font-family="Arial">Strategy → Review → Quality → Deploy → Verify → Govern</text>
  <g font-family="Arial">
    <rect x="90" y="240" rx="28" ry="28" width="220" height="120" fill="#132238" stroke="#38BDF8" stroke-width="2"/>
    <text x="120" y="290" fill="#E2E8F0" font-size="24" font-weight="700">Service Need</text>
    <text x="120" y="325" fill="#94A3B8" font-size="18">Campus system change</text>

    <rect x="360" y="240" rx="28" ry="28" width="220" height="120" fill="#132238" stroke="#38BDF8" stroke-width="2"/>
    <text x="398" y="290" fill="#E2E8F0" font-size="24" font-weight="700">PR Review</text>
    <text x="394" y="325" fill="#94A3B8" font-size="18">Approval &amp; traceability</text>

    <rect x="630" y="240" rx="28" ry="28" width="220" height="120" fill="#132238" stroke="#22C55E" stroke-width="2"/>
    <text x="672" y="290" fill="#E2E8F0" font-size="24" font-weight="700">Quality CI</text>
    <text x="664" y="325" fill="#94A3B8" font-size="18">Build, lint, validate</text>

    <rect x="900" y="240" rx="28" ry="28" width="220" height="120" fill="#132238" stroke="#A78BFA" stroke-width="2"/>
    <text x="950" y="290" fill="#E2E8F0" font-size="24" font-weight="700">Pages + Worker</text>
    <text x="952" y="325" fill="#94A3B8" font-size="18">Cloudflare release</text>

    <rect x="1170" y="240" rx="28" ry="28" width="220" height="120" fill="#132238" stroke="#F59E0B" stroke-width="2"/>
    <text x="1209" y="290" fill="#E2E8F0" font-size="24" font-weight="700">Verification</text>
    <text x="1206" y="325" fill="#94A3B8" font-size="18">Live content check</text>

    <path d="M310 300H360" stroke="#38BDF8" stroke-width="4"/>
    <path d="M580 300H630" stroke="#38BDF8" stroke-width="4"/>
    <path d="M850 300H900" stroke="#38BDF8" stroke-width="4"/>
    <path d="M1120 300H1170" stroke="#38BDF8" stroke-width="4"/>

    <rect x="90" y="470" rx="32" ry="32" width="1300" height="240" fill="#0F1B2D" stroke="#1E293B" stroke-width="2"/>
    <text x="130" y="530" fill="#F8FAFC" font-size="28" font-weight="700">Governance signals</text>
    <text x="130" y="580" fill="#CBD5E1" font-size="22">• Release approval is visible and auditable</text>
    <text x="130" y="620" fill="#CBD5E1" font-size="22">• Quality gates reduce operational risk before deployment</text>
    <text x="130" y="660" fill="#CBD5E1" font-size="22">• Live verification proves user-facing change actually shipped</text>
  </g>
